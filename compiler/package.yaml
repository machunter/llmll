name:                llmll
version:             0.2.0
synopsis:            LLMLL compiler - AI-to-AI programming language
description:         Compiler for the Large Language Model Logical Language
license:             MIT
author:              LLMLL Team
maintainer:          llmll@example.com

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wpartial-fields
  - -Wredundant-constraints

default-extensions:
  - OverloadedStrings
  - DeriveGeneric
  - DeriveAnyClass
  - DerivingStrategies
  - GeneralizedNewtypeDeriving
  - LambdaCase
  - TupleSections

dependencies:
  - base >= 4.18 && < 5
  - text >= 2.0
  - containers >= 0.6
  - megaparsec >= 9.5
  - parser-combinators >= 1.3
  - mtl >= 2.3
  - aeson >= 2.1
  - aeson-pretty >= 0.8
  - optparse-applicative >= 0.18
  - QuickCheck >= 2.14
  - pretty-simple >= 4.1
  - bytestring >= 0.11
  - filepath >= 1.4
  - directory >= 1.3
  - process >= 1.6
  - vector >= 0.13
  - tar >= 0.5
  - zlib >= 0.6
  - unix >= 2.7
  - network >= 3.1     # D5: LLMLL.Serve socket server (kept for getAddrInfo)
  - random >= 1.2      # D5: token generation
  - warp >= 3.3        # D5: HTTP server
  - wai >= 3.2         # D5: WAI application interface
  - http-types >= 0.12 # D5: HTTP status codes + headers
  - time >= 1.12       # v0.3: checkout lock timestamps
  - cryptohash-sha256  # v0.3.1: proof cache obligation hashing

library:
  source-dirs: src
  exposed-modules:
    - LLMLL.Syntax
    - LLMLL.Lexer
    - LLMLL.Parser
    - LLMLL.ParserJSON
    - LLMLL.AstEmit
    - LLMLL.TypeCheck
    - LLMLL.HoleAnalysis
    - LLMLL.Contracts
    - LLMLL.PBT
    - LLMLL.CodegenHs
    - LLMLL.Diagnostic
    - LLMLL.Module
    - LLMLL.Hub
    # D4: liquid-fixpoint decoupled verification backend
    - LLMLL.FixpointIR
    - LLMLL.FixpointEmit
    - LLMLL.DiagnosticFQ
    # D5: HTTP serve endpoint
    - LLMLL.Serve
    # D5: Sketch output contract
    - LLMLL.Sketch
    # v0.3: checkout/patch lifecycle
    - LLMLL.JsonPointer
    - LLMLL.Checkout
    - LLMLL.PatchApply
    # v0.3: stratified verification
    - LLMLL.VerifiedCache
    # v0.3.1: event log
    - LLMLL.Replay
    # v0.3.1: leanstral MCP
    - LLMLL.LeanTranslate
    - LLMLL.MCPClient
    - LLMLL.ProofCache

executables:
  llmll:
    main:                Main.hs
    source-dirs:         src
    dependencies:
      - llmll

tests:
  llmll-test:
    main:                Spec.hs
    source-dirs:         test
    dependencies:
      - llmll
      - hspec >= 2.11
      - hspec-megaparsec >= 2.2
      - QuickCheck
      - aeson
      - time >= 1.12
